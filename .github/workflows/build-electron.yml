name: Build Electron App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js <LaTex>${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: $</LaTex>{{ matrix.node-version }}
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
      
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=<LaTex>$(pnpm store path)" >> $</LaTex>GITHUB_OUTPUT
      
      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: <LaTex>${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: $</LaTex>{{ runner.os }}-pnpm-store-<LaTex>${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            $</LaTex>{{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build Vite project
        run: pnpm run build
      
      - name: Compile Electron files
        run: |
          npx tsc electron/main.ts --outDir electron --module esnext --target es2020 --lib es2020 --moduleResolution node --esModuleInterop --skipLibCheck --strict false
          npx tsc electron/preload.ts --outDir electron --module esnext --target es2020 --lib es2020 --moduleResolution node --esModuleInterop --skipLibCheck --strict false
      
      - name: Build Electron app
        run: pnpm run electron-build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: electron-builds
          path: dist/electron/
          retention-days: 30
      
      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/electron/*.exe
            dist/electron/*.exe.blockmap
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
